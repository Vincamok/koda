name: CI

on:
  push:
    branches: [main, 'claude/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust lint + test ────────────────────────────────────────────────────────
  rust:
    name: Rust (lint + test)
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: koda
          POSTGRES_PASSWORD: koda
          POSTGRES_DB: koda_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DATABASE_URL: postgres://koda:koda@localhost:5432/koda_test
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: koda-rust

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run migrations
        run: |
          cargo install sqlx-cli --no-default-features --features postgres --locked
          sqlx migrate run --source infra/migrations

      - name: Tests
        run: cargo test --workspace

  # ── TypeScript typecheck ────────────────────────────────────────────────────
  typescript:
    name: TypeScript (typecheck + lint)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck packages
        run: npm run typecheck --workspaces --if-present

      - name: Lint
        run: npm run lint --workspaces --if-present

  # ── Build Docker images (only on push to main) ──────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-24.04
    needs: [rust, typescript]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: api
            context: .
            dockerfile: apps/api/Dockerfile
          - service: dashboard
            context: .
            dockerfile: apps/dashboard/Dockerfile
          - service: admin
            context: .
            dockerfile: apps/admin/Dockerfile
          - service: orchestrator
            context: .
            dockerfile: services/orchestrator/Dockerfile
          - service: worker
            context: .
            dockerfile: services/worker/Dockerfile
          - service: git-manager
            context: .
            dockerfile: services/git-manager/Dockerfile
          - service: gateway
            context: .
            dockerfile: services/gateway/Dockerfile
          - service: web-client
            context: .
            dockerfile: apps/web-client/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ── Deploy to staging (only on main) ────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-24.04
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/koda
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f
