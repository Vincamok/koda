name: Harness Registry

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      services:
        description: 'Services à builder (all = tous)'
        required: false
        default: 'all'

env:
  HARNESS_REGISTRY: pkg.harness.io

# Un seul déploiement à la fois vers Harness
concurrency:
  group: harness-push
  cancel-in-progress: false

jobs:
  # ── Build + push vers Harness Artifact Registry ─────────────────────────────
  push:
    name: Push ${{ matrix.service }} → Harness
    runs-on: ubuntu-24.04
    # N'est déclenché que si le CI principal a passé (via branch protection)
    # ou en manuel via workflow_dispatch
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
          - service: dashboard
            dockerfile: apps/dashboard/Dockerfile
          - service: admin
            dockerfile: apps/admin/Dockerfile
          - service: web-client
            dockerfile: apps/web-client/Dockerfile
          - service: orchestrator
            dockerfile: services/orchestrator/Dockerfile
          - service: worker
            dockerfile: services/worker/Dockerfile
          - service: git-manager
            dockerfile: services/git-manager/Dockerfile
          - service: gateway
            dockerfile: services/gateway/Dockerfile
          - service: mcp-gateway
            dockerfile: services/mcp-gateway/Dockerfile

    steps:
      - uses: actions/checkout@v4

      # ── Compute image ref ───────────────────────────────────────────────────
      - name: Compute image reference
        id: ref
        run: |
          ACCOUNT="${{ secrets.HARNESS_ACCOUNT_ID }}"
          REGISTRY="${{ secrets.HARNESS_REGISTRY_NAME }}"
          SERVICE="${{ matrix.service }}"
          SHA="${GITHUB_SHA::8}"

          BASE="${{ env.HARNESS_REGISTRY }}/${ACCOUNT}/${REGISTRY}/${SERVICE}"

          echo "base=${BASE}"           >> "$GITHUB_OUTPUT"
          echo "tag_sha=${BASE}:sha-${SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_latest=${BASE}:latest"  >> "$GITHUB_OUTPUT"

      # ── Docker Buildx ───────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login Harness ───────────────────────────────────────────────────────
      # Harness Artifact Registry accepte :
      #   - username : n'importe quelle valeur non-vide (souvent l'email ou l'account ID)
      #   - password : un Harness API Key (PAT ou Service Account token)
      - name: Log in to Harness Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARNESS_REGISTRY }}
          username: ${{ secrets.HARNESS_USERNAME }}
          password: ${{ secrets.HARNESS_API_KEY }}

      # ── Build & push ────────────────────────────────────────────────────────
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.ref.outputs.tag_sha }}
            ${{ steps.ref.outputs.tag_latest }}
          # Couche de cache GHA partagée avec le job build du CI principal
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          # Metadata OCI standard
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      # ── Résumé ─────────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "### ${{ matrix.service }} pushed to Harness" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | Image |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| sha | \`${{ steps.ref.outputs.tag_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| latest | \`${{ steps.ref.outputs.tag_latest }}\` |" >> "$GITHUB_STEP_SUMMARY"

  # ── Notification finale ─────────────────────────────────────────────────────
  notify:
    name: Notify push complete
    runs-on: ubuntu-24.04
    needs: push
    if: always()
    steps:
      - name: Push status
        run: |
          STATUS="${{ needs.push.result }}"
          echo "Harness registry push: ${STATUS}"
          if [ "${STATUS}" != "success" ]; then
            echo "::warning::One or more images failed to push to Harness registry"
            exit 1
          fi
