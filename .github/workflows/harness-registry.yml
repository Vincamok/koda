name: Harness Registry

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      services:
        description: 'Services à builder (all = tous)'
        required: false
        default: 'all'

# ── Registry self-hosted ─────────────────────────────────────────────────────
# Format image : harness.vincz.fr/<account_id>/<registry_name>/<service>:<tag>
# docker login  : harness.vincz.fr
#   username    : HARNESS_USERNAME  (email du compte ou identifiant service account)
#   password    : HARNESS_API_KEY   (PAT ou SA token, scope : artifact_registry_write)
env:
  HARNESS_HOST: harness.vincz.fr

# Un seul push à la fois
concurrency:
  group: harness-push
  cancel-in-progress: false

jobs:
  # ── Build + push vers Harness Artifact Registry (self-hosted) ────────────────
  push:
    name: Push ${{ matrix.service }} → Harness
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
          - service: dashboard
            dockerfile: apps/dashboard/Dockerfile
          - service: admin
            dockerfile: apps/admin/Dockerfile
          - service: web-client
            dockerfile: apps/web-client/Dockerfile
          - service: orchestrator
            dockerfile: services/orchestrator/Dockerfile
          - service: worker
            dockerfile: services/worker/Dockerfile
          - service: git-manager
            dockerfile: services/git-manager/Dockerfile
          - service: gateway
            dockerfile: services/gateway/Dockerfile
          - service: mcp-gateway
            dockerfile: services/mcp-gateway/Dockerfile

    steps:
      - uses: actions/checkout@v4

      # ── Calcul des tags ─────────────────────────────────────────────────────
      # Harness self-hosted : <host>/<account_id>/<registry_name>/<image>:<tag>
      - name: Compute image references
        id: ref
        run: |
          HOST="${{ env.HARNESS_HOST }}"
          ACCOUNT="${{ secrets.HARNESS_ACCOUNT_ID }}"
          REGISTRY="${{ secrets.HARNESS_REGISTRY_NAME }}"
          SERVICE="${{ matrix.service }}"
          SHA="${GITHUB_SHA::8}"

          BASE="${HOST}/${ACCOUNT}/${REGISTRY}/${SERVICE}"

          echo "tag_sha=${BASE}:sha-${SHA}"   >> "$GITHUB_OUTPUT"
          echo "tag_latest=${BASE}:latest"     >> "$GITHUB_OUTPUT"
          # Tag de version issu du package.json / Cargo.toml si disponible
          echo "tag_ref=${BASE}:${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      # ── Docker Buildx ───────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Authentification Harness ────────────────────────────────────────────
      # Sur Harness self-hosted, le registry Docker est exposé sur le même hôte.
      # Si ton instance utilise un port non-standard, ajoute-le ici :
      #   registry: harness.vincz.fr:5000
      - name: Log in to Harness (harness.vincz.fr)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARNESS_HOST }}
          username: ${{ secrets.HARNESS_USERNAME }}
          password: ${{ secrets.HARNESS_API_KEY }}

      # ── Build & push ────────────────────────────────────────────────────────
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.ref.outputs.tag_sha }}
            ${{ steps.ref.outputs.tag_latest }}
            ${{ steps.ref.outputs.tag_ref }}
          # Cache GHA partagé avec le job build du CI principal
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      # ── Résumé GitHub ───────────────────────────────────────────────────────
      - name: Job summary
        run: |
          {
            echo "### ${{ matrix.service }} → harness.vincz.fr"
            echo ""
            echo "| Tag | Image |"
            echo "| --- | ----- |"
            echo "| sha | \`${{ steps.ref.outputs.tag_sha }}\` |"
            echo "| latest | \`${{ steps.ref.outputs.tag_latest }}\` |"
            echo "| ref | \`${{ steps.ref.outputs.tag_ref }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Statut global ───────────────────────────────────────────────────────────
  status:
    name: Push status
    runs-on: ubuntu-24.04
    needs: push
    if: always()
    steps:
      - name: Check result
        run: |
          RESULT="${{ needs.push.result }}"
          echo "Harness registry push: ${RESULT}"
          if [ "${RESULT}" != "success" ]; then
            echo "::error::Au moins un service n'a pas pu être poussé vers harness.vincz.fr"
            exit 1
          fi
          echo "Tous les services ont été poussés avec succès."
